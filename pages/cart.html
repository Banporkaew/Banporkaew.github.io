<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้าสินค้า | สวนอาหารบ้านปอแก้ว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body{font-family:'Kanit',sans-serif}</style>
</head>
<body class="bg-stone-50 min-h-screen">
    <header class="bg-gray-900 text-white p-5 text-center">
        <h1 class="text-xl font-bold">ตะกร้าสั่งอาหาร</h1>
        <p class="text-sm opacity-90">สวนอาหารบ้านปอแก้ว</p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div id="cart-empty" class="hidden bg-white rounded-2xl p-6 text-center text-gray-600">ตะกร้าว่าง</div>

        <div id="cart-list" class="space-y-2"></div>

        <div class="flex gap-2">
            <button id="btn-copy" class="flex-1 bg-emerald-600 text-white py-2 rounded-xl font-semibold">คัดลอกข้อความเพื่อส่ง (LINE)</button>
            <button id="btn-share" class="bg-green-700 text-white px-4 py-2 rounded-xl font-semibold">แชร์ไป LINE</button>
        </div>

        <div class="flex gap-2">
            <a href="../index.html" class="flex-1 text-center bg-white border border-gray-200 py-2 rounded-xl">กลับเมนู</a>
            <button id="btn-clear" class="bg-red-600 text-white px-4 py-2 rounded-xl">ล้างตะกร้า</button>
        </div>

        <div id="copy-feedback" class="hidden text-sm text-emerald-700 text-center">คัดลอกเรียบร้อยแล้ว สามารถวางในแชท LINE ได้</div>
    </main>

    <script src="../scripts.js"></script>
    <script>
        function renderCartPage() {
            const cart = getCart();
            const listEl = document.getElementById('cart-list');
            const emptyEl = document.getElementById('cart-empty');
            listEl.innerHTML = '';

            if (!cart || cart.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                cart.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'bg-white rounded-2xl p-3 flex items-center justify-between shadow-sm border border-gray-100';
                    row.innerHTML = `
                        <div>
                            <p class="font-medium text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500">จำนวน: <span id="qty-${escapeId(item.name)}">${item.qty}</span></p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="bg-gray-100 px-3 py-1 rounded" onclick="changeQty('${escapeForJs(item.name)}', -1)">-</button>
                            <button class="bg-gray-100 px-3 py-1 rounded" onclick="changeQty('${escapeForJs(item.name)}', 1)">+</button>
                            <button class="text-red-600" onclick="removeItem('${escapeForJs(item.name)}')">ลบ</button>
                        </div>
                    `;
                    listEl.appendChild(row);
                });
            }
        }

        function escapeForJs(s) {
            return s.replace(/'/g, "\\'");
        }

        function escapeId(s) {
            return s.replace(/[^a-zA-Z0-9\-]/g, '_');
        }

        function changeQty(name, delta) {
            const cart = getCart();
            const idx = cart.findIndex(i => i.name === name);
            if (idx < 0) return;
            cart[idx].qty = Math.max(0, (cart[idx].qty || 0) + delta);
            if (cart[idx].qty === 0) cart.splice(idx, 1);
            saveCart(cart);
            renderCartPage();
        }

        function removeItem(name) {
            const cart = getCart().filter(i => i.name !== name);
            saveCart(cart);
            renderCartPage();
        }

        function formatOrderText() {
            const cart = getCart();
            if (!cart || cart.length === 0) return '';
            return cart.map(i => `${i.name} x${i.qty}`).join('\n');
        }

        document.getElementById('btn-copy').addEventListener('click', () => {
            const text = formatOrderText();
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const f = document.getElementById('copy-feedback');
                f.classList.remove('hidden');
                setTimeout(() => f.classList.add('hidden'), 2500);
            });
        });

        document.getElementById('btn-share').addEventListener('click', () => {
            const text = formatOrderText();
            if (!text) return;
            const url = 'https://line.me/R/msg/text/?' + encodeURIComponent(text);
            window.open(url, '_blank');
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm('ต้องการล้างตะกร้าจริงหรือไม่?')) {
                clearCart();
                renderCartPage();
            }
        });

        // render initially
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });
    </script>
</body>
</html>
